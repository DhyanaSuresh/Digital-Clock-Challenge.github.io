<!DOCTYPE html>
<html>
<head>
  <title>7 Segment Clock</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="clock">
  <!-- 6 digits (HH MM SS) -->
  <!-- Hours -->
  <div class="digit"></div>
  <div class="digit"></div>

<!-- Colan -->
  <div class="colon">
    <div class="dot"></div>
    <div class="dot"></div>
  </div>

  <!-- Minutes -->
  <div class="digit"></div>
  <div class="digit"></div>

  <!-- Colan -->
  <div class="colon">
    <div class="dot"></div>
    <div class="dot"></div>
  </div>

  <!-- Seconds -->
  <div class="digit"></div>
  <div class="digit"></div>
</div>

<script src="script.js"></script>
</body>
</html>
