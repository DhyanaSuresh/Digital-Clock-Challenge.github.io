<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dhyana Suresh | Clock Projects</title>

<style>
  :root {
    --bg: linear-gradient(135deg, #dbeafe, #e0f2fe);
    --card: rgba(255,255,255,0.6);
    --text: #1e293b;
    --accent: #2563eb;
  }

  body.dark {
    --bg: linear-gradient(135deg, #0f172a, #1e293b);
    --card: rgba(30,41,59,0.6);
    --text: #f1f5f9;
    --accent: #3b82f6;
  }

  body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    transition: 0.3s;
  }

  header {
    text-align: center;
    padding: 40px 20px 20px;
  }

  header h1 {
    margin: 0;
    font-size: 2.5rem;
  }

  header p {
    opacity: 0.7;
  }

  .toggle {
    position: absolute;
    top: 20px;
    right: 20px;
    cursor: pointer;
    background: var(--card);
    padding: 10px 15px;
    border-radius: 10px;
    backdrop-filter: blur(10px);
  }

  .container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 25px;
    padding: 30px;
    max-width: 1100px;
    margin: auto;
  }

  .card {
    backdrop-filter: blur(15px);
    background: var(--card);
    border-radius: 20px;
    padding: 25px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.15);
    transition: 0.3s;
  }

  .card:hover {
    transform: translateY(-8px) scale(1.02);
  }

  .level {
    font-size: 0.75rem;
    padding: 6px 12px;
    border-radius: 20px;
    background: rgba(37,99,235,0.15);
    display: inline-block;
    margin-bottom: 10px;
    font-weight: 600;
  }

  .title {
    font-size: 1.4rem;
    font-weight: bold;
    margin-bottom: 10px;
  }

  .desc {
    opacity: 0.8;
    margin-bottom: 20px;
  }

  .btn {
    text-decoration: none;
    padding: 10px 18px;
    background: var(--accent);
    color: white;
    border-radius: 10px;
    font-weight: 500;
    transition: 0.3s;
  }

  .btn:hover {
    opacity: 0.85;
  }

  footer {
    text-align: center;
    padding: 20px;
    font-size: 0.9rem;
    opacity: 0.6;
  }
</style>
</head>

<body>

<div class="toggle" onclick="toggleMode()">🌙</div>

<header>
  <h1>Dhyana Suresh</h1>
  <p>Frontend Projects</p>
</header>

<div class="container">

  <div class="card">
    <div class="level">Level 1</div>
    <div class="title">🕒 Text-Based Clock</div>
    <div class="desc">A responsive digital clock using text rendering with real-time updates.</div>
    <a class="btn" href="text-clock/index.html">View Project</a>
  </div>

  <div class="card">
    <div class="level">Level 2</div>
    <div class="title">💡 Seven Segment Clock</div>
    <div class="desc">LED-style clock built using pure HTML, CSS, and JavaScript animations.</div>
    <a class="btn" href="seven-segment-clock/index.html">View Project</a>
  </div>

</div>

<footer>
  Built by Dhyana 🚀
</footer>

<script>
function toggleMode() {
  document.body.classList.toggle("dark");
}
</script>

</body>
</html>
